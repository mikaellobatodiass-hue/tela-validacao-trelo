<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Trello</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="stylesheet.json">
</head>

<body>

  <header class="trello-brand">
    <div class="trello-logo">
      <img src="./img/trello.svg" alt="Logo Trello">
    </div>
  </header>

  <div class="section-wrapper">
    <div class="account-form">

      <h1 class="account-title">Faça login no Trello</h1>

      <form class="account-form">
        <input type="email" placeholder="Digite seu email">
        <input type="password" placeholder="Digite sua senha">
        <input type="submit" value="Fazer login">

        <span class="login-separator">OU</span>

        <button class="oauth-button" type="button">
          <img src="./img/google.svg">
          <span>Continuar com o Google</span>
        </button>

        <button class="oauth-button" type="button">
          <img src="./img/microsoft.svg">
          <span>Continuar com a Microsoft</span>
        </button>

        <button class="oauth-button" type="button">
          <img src="./img/apple.svg">
          <span>Continuar com a Apple</span>
        </button>

        <button class="oauth-button" type="button">
          <img src="./img/slack.svg">
          <span>Continuar com o Slack</span>
        </button>
      </form>

    </div>
  </div>

  <!-- ✅ FOOTER CORRETO -->
  <footer class="global-footer">
    <img class="interactive-logo" src="./img/interactive.svg" alt="Interactive">
    <img class="analytics-logo" src="./img/analytics.svg" alt="Analytics">
  </footer>

</body>

</html>
